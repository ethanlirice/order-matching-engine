name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DLOB_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang clang-format clang-tidy

      - name: Check formatting
        run: |
          find include src tests -name '*.hpp' -o -name '*.cpp' \
            | xargs clang-format --dry-run --Werror

      - name: Configure (for compile_commands.json)
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: clang-tidy (informational)
        run: |
          find include src -name '*.hpp' -o -name '*.cpp' \
            | xargs clang-tidy -p build || true
